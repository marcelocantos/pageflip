    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T9.1:
    name: Live audio is captured and piped to an in-process Transcriber — no audio ever written to disk or network
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - System audio is captured via macOS ScreenCaptureKit's audio stream
    - Captured buffers are delivered to a `Transcriber` trait living inside `src/audio/`; the raw-audio type is crate-private and does not implement Serialize, file-write, or any network trait
    - No code path writes audio samples to disk (no WAV, no raw, no cache, no temp) and no code path ships audio samples to a network endpoint — enforced at the module / type boundary, not by convention
    - Starting capture with `--audio` requires a configured Transcriber; otherwise pageflip exits with a readable error before opening the audio device
    - A `NullTranscriber` exists (discards samples) so unit tests and dry runs do not require a real Whisper model
    - Audio-capture failures (e.g. TCC denial) surface a useful error without crashing the frame loop
    context: 'First sub-target of T9. Hard legal/policy constraint from the project owner: audio may be USED to derive transcripts in real time, but MUST NEVER be recorded to disk or transmitted anywhere. This target enforces that constraint architecturally — the raw-audio type stays crate-private inside `src/audio/` and the only thing that can leave that module is a transcript segment. Observable checkpoint: with `--audio --transcriber null`, capture runs, the null transcriber receives samples, and no audio file is ever produced in the output dir.'
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T9.2:
    name: WhisperX transcribes buffered audio locally via Whisper large-v3 into transcript.jsonl
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - Transcription uses WhisperX (Python) invoked as a subprocess by pageflip, running Whisper large-v3 weights locally via faster-whisper / CTranslate2 with Metal acceleration on M-series
    - The audio captured under T9.1 is handed to WhisperX as a bounded in-memory buffer (or a FIFO pipe) — never written to disk as a file the filesystem retains after transcription completes
    - 'Inference is fully offline at runtime: the only permitted network activity is the initial one-time model download via `scripts/fetch-models.sh` (or equivalent); runtime enforces `--no-network` by refusing to hit the network even if a code path tries'
    - WhisperX's word-level forced alignment (via wav2vec2) produces `{start_ms, end_ms, text, word_segments[]}` segments written to `transcript.jsonl` in the output directory, flushed per segment
    - 'Post-hoc operation is explicitly supported: WhisperX runs on the complete buffered audio at stop-time (or on segment boundaries), not necessarily in real time — budget is the meeting length, not 1x real-time'
    - A `NullTranscriber` variant still exists for tests / dry-runs (discards samples; produces no transcript.jsonl)
    context: 'Pins the concrete stack: WhisperX + Whisper large-v3 + CTranslate2 / faster-whisper backend. Runs as a Python subprocess (managed via uv per the global tooling convention). Chosen over whisper.cpp alone because WhisperX delivers word-level timestamps via wav2vec2 forced alignment, which makes T9.3''s slide-join precise instead of segment-granular. Best-quality option available locally. Model weights fetched by `scripts/fetch-models.sh` from ggerganov (Whisper) and HuggingFace Hub (faster-whisper mirror if needed); no runtime network. Observable checkpoint: `transcript.jsonl` with word-level timestamps that the user can `jq` to inspect.'
    depends_on:
    - T9.1
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T9.3:
    name: pyannote diarisation inside WhisperX adds speaker IDs; slide alignment joins transcript rows to PNG timestamps
    status: identified
    value: 8.0
    cost: 5.0
    observable: true
    acceptance:
    - WhisperX's built-in diarisation path runs pyannote/speaker-diarization-3.1 locally on the buffered audio — no audio or embedding ever sent to a network endpoint
    - Speaker IDs are stable across the meeting (speaker_0, speaker_1, …); an optional YAML config maps them to display names post-hoc
    - Each row in `transcript.jsonl` is enriched to `{slide_id, t_start_ms, t_end_ms, text, speaker_id, word_segments[]}` by joining WhisperX's word-level timestamps against the PNG stream's mtime metadata — a pure data-manipulation pass in Rust after the subprocess returns
    - The pyannote model download is a one-time step documented in `scripts/fetch-models.sh` — requires a HuggingFace auth token because pyannote's licence is gated, run-once then forgotten
    - Diarisation runs as a finalisation pass at stop-time (post-hoc is fine per project policy), not in the capture-hot loop
    context: 'Pyannote/speaker-diarization-3.1 is the highest-quality open diariser on meeting-style audio (~90% accuracy on 2-6 speakers, turns \u22653s). WhisperX bundles it natively, so T9.2 and T9.3 are implementation-wise one subprocess call that produces fully-enriched segments; target-level separation reflects two different observable checkpoints (text \u2192 text+speakers+slides). Slide alignment is a pure Rust join against PNG mtimes and runs inside pageflip after the subprocess returns \u2014 no audio involvement. Observable: transcript.jsonl rows show speaker_id + slide_id; the user can jump to a slide and see who said what.'
    depends_on:
    - T9.2
    origin: manual
    discovered: 2026-04-15
