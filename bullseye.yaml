schema_version: 1
targets:
  T1:
    name: Rust implementation captures a screen region to deduplicated PNGs on macOS
    status: achieved
    value: 13.0
    cost: 5.0
    acceptance:
    - Cargo project replaces the Python code; `cargo build --release` produces a single `pageflip` binary on macOS arm64
    - '`pageflip --region X,Y,W,H --interval 2 --threshold 10 --output <dir>` captures the region on each tick and writes a PNG only when pHash Hamming distance from the last saved frame exceeds the threshold'
    - Capture and hash loop uses a platform-abstract trait so Windows/Linux backends slot in without rewriting call sites
    - macOS Screen Recording permission prompt is handled cleanly with a useful error message on denial
    context: Foundation for everything else. The current Python stub broke on uv's Python Tk (missing Tcl). User prefers compiled, cross-platform-capable; Rust chosen (Swift rejected for mac lock-in). This target establishes the Cargo project, portable screen-capture abstraction (xcap or scap as a starting point), perceptual-hash dedup, CLI surface (--region, --interval, --threshold, --output), and PNG writer. macOS-first but the architecture must not preclude Windows/Linux backends later.
    origin: bullseye_init
    discovered: 2026-04-14
    achieved: 2026-04-14
  T1.1:
    name: Cargo skeleton compiles and the pageflip binary implements --version, --help, --help-agent
    status: achieved
    value: 5.0
    cost: 1.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - A Cargo workspace builds via `cargo build --release` and produces a single `pageflip` binary on macOS arm64
    - '`pageflip --version` prints the crate version'
    - '`pageflip --help` prints a usage message listing the planned flags (`--region`, `--interval`, `--threshold`, `--output`)'
    - '`pageflip --help-agent` prints machine-readable help per the global CLI Binaries convention'
    - The Python stub is removed or clearly marked legacy so there is no ambiguity about which implementation is current
    context: 'First sub-target split out of the original T1 umbrella. Establishes the Cargo project, CLI skeleton, and release-binary plumbing — no capture logic yet. Observable checkpoint: running `pageflip --help` in a terminal proves the walking skeleton exists. Unblocks T1.2.'
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T1.2:
    name: pageflip captures a single macOS region to one PNG from CLI args
    status: achieved
    value: 8.0
    cost: 2.0
    observable: true
    actual_cost: 2.0
    acceptance:
    - '`pageflip --region X,Y,W,H --output <dir>` captures the given rectangle once on macOS and writes one PNG, then exits'
    - Pixel coordinates are correct on Retina displays (no half-size captures)
    - macOS Screen Recording permission prompt is handled cleanly with a useful error message on denial
    - A platform-abstract capture trait exists so Windows/Linux backends can slot in without rewriting call sites (only macOS backend is implemented)
    context: 'Second sub-target of the original T1. Delivers the smallest end-to-end slice: one PNG on disk from CLI args. Establishes the ScreenCaptureKit-based macOS backend, the platform-neutral capture trait, the permission-handling path, and the PNG writer. No timer loop, no dedup — those arrive in T1.3. Observable checkpoint: a single screenshot file the user can open. Unblocks T1.3.'
    depends_on:
    - T1.1
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T1.3:
    name: pageflip runs an interval capture loop with pHash dedup and writes only-changed PNGs
    status: achieved
    value: 13.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip --region X,Y,W,H --interval 2 --threshold 10 --output <dir>` captures on each tick and writes a PNG only when the perceptual-hash Hamming distance from the last saved frame exceeds the threshold'
    - The capture-and-hash loop is defined in terms of the platform-abstract trait established in T1.2, so new backends plug in without touching the loop
    - Emits one line per saved PNG on stdout so downstream tools (feeder, tests) can consume the stream
    - Ctrl-C terminates cleanly and flushes any in-flight frame
    context: 'Third sub-target of the original T1. Adds the interval loop, the perceptual-hash dedup gate, and the stdout stream that T5 will consume. After this lands, the original T1 is fully superseded and downstream targets (T2, T3, T5, T9, T10) can begin. Observable checkpoint: a directory of deduped slide PNGs accumulating as the screen changes.'
    depends_on:
    - T1.2
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T10:
    name: Local-first redaction pipeline strips PII from every frame before any SaaS egress
    status: achieved
    value: 13.0
    cost: 5.0
    acceptance:
    - Face detection blurs all detected faces in each captured frame before the frame reaches any downstream consumer
    - A pluggable PII redactor (regex + local NER) masks emails, phone numbers, credit cards, government IDs, and obvious names in OCR text
    - An app/domain allowlist drops frames whose frontmost application is not permitted to leave the machine
    - '`--paranoid` retains unredacted originals locally and forwards only redacted artifacts'
    - No code path reaches a network SaaS call without passing through the redactor first (enforced by type or architectural boundary, not by convention)
    context: Corporate use is impossible without this. Runs entirely on-device so the PII never leaves the machine. Face detection via Apple Vision.framework / CoreML blurs participant video tiles; OCR + local NER + regex redacts emails, phone numbers, credit cards, government IDs, and obvious personal names; a domain/app allowlist drops frames whose focused app is not permitted (e.g., HR system, banking). `--paranoid` retains the unredacted original locally and ships only the redacted frame to any downstream consumer. Placed as a blocker for T5 (feeder) because SaaS egress of unredacted meeting frames is a career-ending risk in most enterprises.
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T10.1:
    name: Face-blur redactor blurs all detected faces in each captured frame before any downstream consumer
    status: identified
    value: 8.0
    cost: 3.0
    observable: true
    acceptance:
    - A `Redactor` trait with a `FaceBlurRedactor` implementation lives in `src/redact/`
    - Face detection uses Apple Vision (`objc2-vision`) on macOS; detected rectangles are blurred in the RGBA buffer before the Frame is saved
    - A `RedactPipeline` composes redactors and is invoked on every saved frame when the redaction gate is on
    - Default behaviour is unchanged (redaction opt-in) until T10.3 flips it to opt-out for egress
    - No-face-detected is not an error — the frame passes through unchanged
    context: 'First sub-target of T10. Corresponds to the face-detection-and-blur leg of the full redaction pipeline. Does not address PII text redaction (T10.2) or egress controls (T10.3). Observable checkpoint: run pageflip on a frame with a visible face (e.g. a video call participant tile), see the saved PNG with the face blurred.'
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-15
  T10.2:
    name: PII text redactor masks emails, phones, card numbers, IDs, and named entities in OCR'd frame text
    status: identified
    value: 8.0
    cost: 5.0
    observable: true
    acceptance:
    - Frames pass through OCR (Apple Vision VNRecognizeTextRequest on macOS) to yield per-word bounding boxes + strings
    - A regex-based PII detector flags emails, phone numbers, credit-card numbers, and government-ID patterns
    - A local NER pass flags obvious person/org/location names using a small on-device model (e.g. via rust-bert, or a subprocess to a tiny spaCy model)
    - Detected regions are masked (black box, blur, or opaque rectangle) in the saved frame
    - '`RedactPipeline` can chain the text redactor after the face redactor; order is configurable'
    context: 'Second sub-target of T10. OCR is introduced here because redacting text requires it; other targets (T11 resolver, T14 contradictions, T16 dejargoniser) will reuse the same OCR output stream. Observable: a saved frame with visible PII that is blacked out after redaction. Depends on T10.1 so the RedactPipeline trait and plumbing exist before stacking a second redactor on top.'
    depends_on:
    - T10.1
    origin: manual
    discovered: 2026-04-15
  T10.3:
    name: App allowlist + paranoid mode + architectural egress gate enforce redaction before network egress
    status: identified
    value: 8.0
    cost: 3.0
    observable: true
    acceptance:
    - An app/domain allowlist drops frames whose frontmost application is not permitted to leave the machine
    - 'Frontmost-app detection uses NSWorkspace on macOS; allowlist loaded from config (default: empty = permit none for egress)'
    - A `--paranoid` flag retains unredacted originals locally and forwards only redacted artifacts to any egress path
    - Any network egress path (e.g. future `pageflip-feed --egress saas`) is gated on a loaded RedactPipeline — enforced at the type level, not by convention
    - A separate `Egress` trait (or equivalent) makes it a compile error to ship a Frame to a remote endpoint without first passing through `RedactPipeline::apply`
    context: 'Third sub-target of T10. This is the *policy and enforcement* layer on top of the detection layers (T10.1, T10.2). The architectural-boundary requirement (criterion 5 of the original T10) matters most here: we want a type-system-level guarantee that redaction cannot be bypassed on the egress path. Observable: a compile error when attempting to construct an egress call with an un-redacted Frame, plus a runtime rejection when the allowlist denies the frontmost app.'
    depends_on:
    - T10.1
    origin: manual
    discovered: 2026-04-15
  T11:
    name: Reference resolver is a pluggable pipeline with MCP auto-discovery and document-name capture
    status: identified
    value: 8.0
    cost: 8.0
    acceptance:
    - Resolver stages are registerable via config; adding a new reference type does not require changes to the capture loop
    - Built-in stages cover URLs, Jira keys, Confluence page titles, GitHub PR/issue references, Slack permalinks
    - PowerPoint / Keynote / Google Slides window-title document names are captured per frame and threaded through the resolver
    - Unrecognised patterns with repeated occurrence are surfaced as "candidate MCP resolver needed" suggestions, with sample strings
    - Resolved references become a stable structured stream consumable by downstream targets (T5, T13, T14, T16)
    context: 'Generalises the URL-extraction idea into an extensible resolver stack. Each captured string (from OCR or transcript) passes through stages: regex patterns → embedding similarity against known reference shapes → LLM classification → MCP server call. Built-in resolvers for URLs, Jira tickets, Confluence page titles, GitHub PRs/issues, Slack permalinks. Non-slide text references are captured too — the PowerPoint window-title "Deck.pptx - PowerPoint" gives the source document name; Teams chat-pane OCR gives in-meeting links; Keynote/Google-Slides title bars give deck provenance. Unknown patterns surface as candidate new resolvers ("I saw 47 strings matching FOO-\\d+ that no resolver recognised — is there an MCP server for this?"). Output feeds every downstream consumer: the context fetcher, contradiction detector, cognitive-augmentation sidebar, dejargoniser.'
    depends_on:
    - T1.3
    - T9.2
    origin: manual
    discovered: 2026-04-14
  T12:
    name: Each meeting produces a structured artifact written to a configurable docs/ path
    status: identified
    value: 8.0
    cost: 5.0
    observable: true
    acceptance:
    - Each capture session produces a single folder containing slides/*.png, transcript.md, decisions.md, actions.md, references.json, contradictions.md, open-questions.md
    - Destination path is configurable (CLI flag + config file); default points at a user-designated docs/ folder
    - transcript.md rows are speaker-attributed and timestamp-aligned to slide boundaries
    - decisions.md and actions.md are extracted automatically by an LLM pass over the transcript + slide text
    - Re-running on the same meeting ID does not destroy the prior artifact (append / version / refuse-and-warn)
    context: 'Final output shape: a folder per meeting containing slides/*.png, transcript.md (speaker-attributed, slide-aligned), decisions.md, actions.md (with inferred assignees), references.json (resolved), contradictions.md, open-questions.md. Destination is configurable; the natural default is a designated "meetings" repo''s docs/ subdirectory so mnemo will index it automatically (see companion mnemo target). Rerun safety: re-capturing the same meeting appends or versions rather than destroys. Replaces ad-hoc PNG dumps with a mnemo-indexable, human-readable artifact that''s joinable against code commits, Jira tickets, and prior meetings.'
    depends_on:
    - T9.3
    - T11
    origin: manual
    discovered: 2026-04-14
  T13:
    name: Real-time cognitive-augmentation sidebar runs skeptic, constructive, and neutral perspectives in parallel
    status: identified
    value: 8.0
    cost: 5.0
    acceptance:
    - 'For each new slide, three perspectives are produced: skeptic (challenges), constructive (additions), neutral (links and context)'
    - Outputs appear in a sidecar view (log file, web pane, or Claude Code session) within ~5 seconds of slide detection
    - Each perspective is clearly labelled so the user can triage at a glance
    - Neutral perspective includes paste-able URLs and short quotes, not just summaries
    - Perspectives can be individually enabled/disabled via flag
    context: 'Pure devil''s-advocate was the original framing, but the useful stance is "knowledgeable colleague" — skeptical where rigour is missing, constructive where ideas are directionally sound, neutral-informative where neither applies. Three subagents run in parallel per new slide: skeptic (challenge questions, missing assumptions, counter-evidence), constructive (addenda, directional suggestions, "yes-and" extensions), neutral (paste-able links to authoritative sources, relevant prior decisions, adjacent context worth knowing). Output is a sidebar/log the user scans during the meeting — never injected into the meeting itself. Latency budget matters: the suggestions need to arrive before discussion has moved on.'
    depends_on:
    - T11
    origin: manual
    discovered: 2026-04-14
  T14:
    name: Cross-meeting contradiction detector surfaces conflicts in real time via the resolver pipeline
    status: identified
    value: 13.0
    cost: 5.0
    acceptance:
    - Every claim in slide OCR and transcript is embedded and persisted to mnemo alongside its provenance (meeting, slide, timestamp, speaker)
    - When a new claim's embedding matches a prior claim beyond a threshold but surface forms conflict (numeric, negation, assignee), a contradiction is surfaced
    - Contradictions appear in the cognitive-augmentation sidebar in real time, not post-hoc
    - False-positive rate is tunable via threshold; default setting surfaces roughly one contradiction per long meeting block rather than noise
    - Each contradiction links to the prior meeting artifact and the specific slide or transcript segment that conflicts
    context: 'The killer corporate feature. Each slide''s OCR and transcript claims are embedded and stored via mnemo (which is already indexing the docs/ artifact stream from T12). When a new claim arrives, a similarity search against prior meetings returns semantically close but numerically or factually divergent statements ("Q3 revenue was $10M" in January vs. "$12M" in April). Contradictions surface in real time through the same sidebar as T13 — they routed through the resolver (T11) so the call-out is part of the standard context-augmentation flow rather than a separate feature. Calibration matters: false-positive rate tunable, default aims for ~1 flagged contradiction per long meeting block so the user trusts the signal.'
    depends_on:
    - T11
    - T12
    origin: manual
    discovered: 2026-04-14
  T15:
    name: Stopping capture autostarts a Claude Code dialog preloaded with the full meeting artifact
    status: identified
    value: 5.0
    cost: 2.0
    acceptance:
    - Capture-stop triggers `claude` (new session or `--resume <id>`) with a preamble that loads the artifact folder
    - User is dropped into a conversational prompt and can immediately ask questions about the meeting
    - Session ID is configurable so related meetings can thread into a single ongoing dialog
    - If the user exits without engaging, no artifact state is lost
    context: 'When capture stops, a Claude Code session is launched (or resumed) with the full artifact folder already in context: slides, transcript, references, decisions, actions, contradictions. The user isn''t uploading files after the meeting — they''re continuing a conversation the tool already had. Session ID is optional so the same dialog can span many meetings on a theme ("the project Foo steering group") across days.'
    depends_on:
    - T12
    origin: manual
    discovered: 2026-04-14
  T16:
    name: Dejargoniser expands acronyms from a local Confluence glossary and researches unknown TLAs in real time
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - A one-command scrape builds a local cache of Confluence-defined acronyms and jargon
    - OCR'd and transcribed acronyms get inline expansion in the cognitive-augmentation sidebar
    - Unknown acronyms trigger a background research pass (Confluence / GitHub / web) and print candidate expansions inline
    - Cache refresh is incremental where possible and bounded in cost (no re-scraping the entire wiki each time)
    - Misrecognised acronyms (OCR errors) don't pollute the cache
    context: Corporate meetings are acronym-dense. A one-time scrape of the organisation's Confluence glossary pages builds a locally-cached acronym/jargon index (re-scrapable on a schedule). OCR'd or transcribed acronyms get expanded against the cache and surfaced inline in the sidebar. Acronyms with no cache hit (e.g., a new three-letter abbreviation first heard in a meeting) trigger a lightweight background research agent — Confluence search, GitHub search, web search — and print candidate expansions inline so the user isn't silently confused. Runs via the resolver (T11) so "unknown acronym" is just another resolver stage.
    depends_on:
    - T11
    origin: manual
    discovered: 2026-04-14
  T17:
    name: Weekly meta-pattern digest is produced by a scheduled `claude -p /skill` invocation over the week's artifacts
    status: identified
    value: 3.0
    cost: 2.0
    acceptance:
    - A `/meetings-digest` (or similar) skill exists and produces a weekly digest from a directory of artifact folders
    - A cron/launchd entry invokes it on schedule
    - 'Digest lands somewhere reviewable: a markdown file committed to a repo, an email, or a mnemo session'
    - 'Output calls out: recurring themes, drifting decisions, aging open questions, newly-surfaced contradictions, and speaker-pattern observations'
    - Implementation is a skill + a scheduler entry, nothing more — no long-running service
    context: 'A scheduled job (cron or launchd) invokes `claude -p ''/meetings-digest''` over the week''s artifact folders. The skill reads slides, transcripts, decisions, open questions, and contradictions, and emits a digest: themes recurring across meetings, decisions that drifted or reversed, open questions that have aged, fresh contradictions worth surfacing, speakers dominating or absent. Zero service to operate — the machinery is just a cron entry pointing at a skill, so there''s nothing to maintain beyond the skill''s prompt itself.'
    depends_on:
    - T12
    origin: manual
    discovered: 2026-04-14
  T2:
    name: Interactive region picker lets the user draw a rectangle on the desktop (macOS)
    status: achieved
    value: 5.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip` with no `--region` shows a semi-transparent fullscreen overlay with crosshair cursor'
    - Click-drag draws a visible rectangle; release begins capture using those pixel coordinates
    - Coordinates are correct on Retina displays (no half-size captures)
    - Escape exits without capturing
    context: Running `pageflip` with no region flag should present a fullscreen transparent overlay with a rubber-band rectangle. Retina-aware (overlay in points, capture coords in pixels). Escape cancels. Tk on uv's Python was a failed first attempt; the Rust implementation uses winit + softbuffer/pixels for drawing, which avoids the Tcl runtime issue entirely.
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T3:
    name: pageflip can target a specific window and keep capturing it when backgrounded (macOS)
    status: achieved
    value: 8.0
    cost: 5.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip --window` shows a list of visible windows (title + app) and lets the user pick one'
    - '`pageflip --window-title "Teams"` attaches to the first window whose title contains the substring'
    - Capture continues unchanged when the target window is covered by another window, moved, or on another Space
    - The capture bitmap reflects the window's current content (not a stale cached frame) each tick
    context: 'Primary use case is capturing slides from a Teams meeting where the window may be occluded, behind another app, or off-screen. macOS ScreenCaptureKit with SCContentFilter(desktopIndependentWindow:) captures the window''s backing store regardless of foreground state. Supports two selection modes: interactive window picker (enumerate via CGWindowListCopyWindowInfo) and non-interactive `--window-title` substring match. Moving/resizing the target window must not break the capture stream.'
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T4:
    name: User can crop a sub-rectangle within a selected window and have it tracked as the window moves or resizes
    status: identified
    value: 3.0
    cost: 3.0
    acceptance:
    - '`pageflip --window --crop` picks a window, snapshots it, and shows the snapshot with a rubber-band picker'
    - The rectangle is stored as fractional or absolute window-relative coordinates, not screen-absolute
    - If the user resizes the window during capture, the crop still covers the same logical sub-region (proportional) or clamps gracefully
    - Output PNGs contain only the cropped region
    context: A Teams window has chrome, participant tiles, and a chat pane; only the shared-screen area is interesting. The picker takes a one-shot snapshot of the selected window, displays it, and lets the user drag a rectangle on the snapshot. The resulting bbox is stored as window-relative coordinates, so subsequent captures crop consistently even if the window is moved, resized, or rescaled on another display. Avoids the "overlay tracks the window" UX which is fragile.
    depends_on:
    - T3
    origin: manual
    discovered: 2026-04-14
  T5:
    name: A filesystem-watching feeder pushes each new slide into an active Claude Code session for live analysis
    status: achieved
    value: 13.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - A feeder binary or subcommand watches an output directory and reacts to new PNG files
    - Each new image triggers `claude -p <prompt> --resume <session-id>` with the image attached via `@path` reference
    - Session ID is configurable; missing session produces a useful error without crashing the capture loop
    - Capture and feeding are independent — a broken Claude invocation does not stop pageflip from continuing to save files
    - Defaults to local-only invocation of `claude`; any mode that ships frames to a remote/SaaS endpoint is gated on the redactor from T10 being loaded and enforced (enforced by type or architectural boundary, not by convention)
    context: 'Decoupled from T10 on 2026-04-14. Rationale: T5 is the whole point of pageflip (feed slides into Claude during a meeting); gating it behind full PII/face-detection (T10) delayed all observable value by months. T10 remains a first-class target and is enforced at the egress boundary — the local default path does not need it, but any SaaS/remote egress mode must have it loaded. This keeps the corporate-safety story intact without blocking personal-use MVP value.'
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T6:
    name: Windows backend reaches feature parity (region, window, background window, crop)
    status: identified
    value: 5.0
    cost: 8.0
    acceptance:
    - All capture modes (region, window, cropped window) work on Windows 11
    - Background and minimised windows continue to produce updated captures
    - Release binary builds in CI for x86_64-pc-windows-msvc and aarch64-pc-windows-msvc
    - Interactive region picker overlay renders correctly on Windows at 100% and 200% DPI
    context: Corporate environments run Windows as often as macOS. Windows.Graphics.Capture (Win10 1809+) via the windows-capture crate covers region and window capture, including minimised/occluded windows via the DWM compositor surface. PrintWindow(PW_RENDERFULLCONTENT) is the fallback path. winit handles the overlay. `cargo build --target x86_64-pc-windows-msvc` from mac via cross-compilation, or run CI on Windows.
    depends_on:
    - T1
    - T2
    - T3
    - T4
    origin: manual
    discovered: 2026-04-14
  T7:
    name: Linux backend works under X11; Wayland supported on best-effort basis
    status: identified
    value: 2.0
    cost: 8.0
    acceptance:
    - Region and window capture work on X11 with a compositor running
    - Background-window capture works on X11 via XComposite
    - 'Wayland: runs on KDE and GNOME to the extent their portal implementations allow; limitations are documented rather than worked around'
    - Release binary builds in CI for x86_64-unknown-linux-gnu and aarch64-unknown-linux-gnu
    context: 'Lowest-priority platform (user has no current Linux use case) but the cross-platform capability is what justified Rust over Swift. X11 path uses XCompositeNameWindowPixmap for background windows (requires a running compositor, which is near-universal). Wayland is intentionally best-effort: xdg-desktop-portal''s ScreenCast for window pick works on KDE/GNOME but background-window capture is compositor-dependent and may simply not be achievable on some setups. Acceptance reflects this asymmetry.'
    depends_on:
    - T1
    - T2
    - T3
    - T4
    origin: manual
    discovered: 2026-04-14
  T8:
    name: pageflip is installable via Homebrew tap and ships release binaries on tag
    status: identified
    value: 3.0
    cost: 3.0
    observable: true
    acceptance:
    - '`brew install marcelocantos/tap/pageflip` installs a working macOS arm64 binary'
    - Tagging `v0.1.0` on master triggers a GitHub Actions workflow that builds, tests, and publishes release binaries
    - Release includes `--version`, `--help`, `--help-agent` per the CLI convention
    - Binary is code-signed or users are given clear Gatekeeper bypass instructions in the README
    context: Homebrew-tap install for macOS arm64. Decoupled from T5 on 2026-04-14 — a distributable capture tool is valuable on its own (region + picker), and bundling the feeder into the install gate delayed the dogfoodable release unnecessarily. Windows/Linux distribution piggybacks once T6/T7 land.
    depends_on:
    - T1.3
    - T2
    origin: manual
    discovered: 2026-04-14
  T9:
    name: System audio is captured alongside frames and transcribed locally with speaker attribution
    status: achieved
    value: 13.0
    cost: 8.0
    observable: true
    acceptance:
    - System audio is captured via ScreenCaptureKit alongside screen frames on macOS
    - Local Whisper (distil-large-v3 or large-v3-turbo by default, large-v3 optional) transcribes at ≥ 5x real-time on a 16-GPU M4 with 48 GB RAM
    - Transcript segments are timestamped and aligned to the slide visible at that moment (stored as (slide_id, t_start, t_end, text, speaker_id) rows)
    - Speaker diarisation assigns stable speaker IDs per utterance; optional name mapping via config
    context: The audio channel is the missing half of the meeting signal. Most later features (contradiction detection, cognitive augmentation, meta-patterns) gain step-function value once transcript + speaker attribution are aligned to the slide visible at that moment. Model sizing is tuned for the user's 48 GB / 16-GPU work machine (not the 128 GB home machine) — default to distil-large-v3 (~800 MB) or large-v3-turbo rather than full large-v3, both of which fit comfortably and run at ~5-8x real-time on Apple Silicon. Diarisation via pyannote or equivalent gives per-speaker segmentation without Teams cooperation.
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T9.1:
    name: pageflip captures system audio to a WAV file alongside frames on macOS
    status: identified
    value: 8.0
    cost: 3.0
    observable: true
    acceptance:
    - System audio is captured on macOS via ScreenCaptureKit's audio stream, independently of frame capture
    - '`pageflip --audio --output <dir>` writes an `audio.wav` file in the output directory while the capture loop runs'
    - WAV is 16-bit PCM at 48 kHz stereo (or whatever ScreenCaptureKit natively delivers, documented in --help-agent)
