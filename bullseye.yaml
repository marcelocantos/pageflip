schema_version: 1
targets:
  T1:
    name: Rust implementation captures a screen region to deduplicated PNGs on macOS
    status: achieved
    value: 13.0
    cost: 5.0
    acceptance:
    - Cargo project replaces the Python code; `cargo build --release` produces a single `pageflip` binary on macOS arm64
    - '`pageflip --region X,Y,W,H --interval 2 --threshold 10 --output <dir>` captures the region on each tick and writes a PNG only when pHash Hamming distance from the last saved frame exceeds the threshold'
    - Capture and hash loop uses a platform-abstract trait so Windows/Linux backends slot in without rewriting call sites
    - macOS Screen Recording permission prompt is handled cleanly with a useful error message on denial
    context: Foundation for everything else. The current Python stub broke on uv's Python Tk (missing Tcl). User prefers compiled, cross-platform-capable; Rust chosen (Swift rejected for mac lock-in). This target establishes the Cargo project, portable screen-capture abstraction (xcap or scap as a starting point), perceptual-hash dedup, CLI surface (--region, --interval, --threshold, --output), and PNG writer. macOS-first but the architecture must not preclude Windows/Linux backends later.
    origin: bullseye_init
    discovered: 2026-04-14
    achieved: 2026-04-14
  T1.1:
    name: Cargo skeleton compiles and the pageflip binary implements --version, --help, --help-agent
    status: achieved
    value: 5.0
    cost: 1.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - A Cargo workspace builds via `cargo build --release` and produces a single `pageflip` binary on macOS arm64
    - '`pageflip --version` prints the crate version'
    - '`pageflip --help` prints a usage message listing the planned flags (`--region`, `--interval`, `--threshold`, `--output`)'
    - '`pageflip --help-agent` prints machine-readable help per the global CLI Binaries convention'
    - The Python stub is removed or clearly marked legacy so there is no ambiguity about which implementation is current
    context: 'First sub-target split out of the original T1 umbrella. Establishes the Cargo project, CLI skeleton, and release-binary plumbing — no capture logic yet. Observable checkpoint: running `pageflip --help` in a terminal proves the walking skeleton exists. Unblocks T1.2.'
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T1.2:
    name: pageflip captures a single macOS region to one PNG from CLI args
    status: achieved
    value: 8.0
    cost: 2.0
    observable: true
    actual_cost: 2.0
    acceptance:
    - '`pageflip --region X,Y,W,H --output <dir>` captures the given rectangle once on macOS and writes one PNG, then exits'
    - Pixel coordinates are correct on Retina displays (no half-size captures)
    - macOS Screen Recording permission prompt is handled cleanly with a useful error message on denial
    - A platform-abstract capture trait exists so Windows/Linux backends can slot in without rewriting call sites (only macOS backend is implemented)
    context: 'Second sub-target of the original T1. Delivers the smallest end-to-end slice: one PNG on disk from CLI args. Establishes the ScreenCaptureKit-based macOS backend, the platform-neutral capture trait, the permission-handling path, and the PNG writer. No timer loop, no dedup — those arrive in T1.3. Observable checkpoint: a single screenshot file the user can open. Unblocks T1.3.'
    depends_on:
    - T1.1
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T1.3:
    name: pageflip runs an interval capture loop with pHash dedup and writes only-changed PNGs
    status: achieved
    value: 13.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip --region X,Y,W,H --interval 2 --threshold 10 --output <dir>` captures on each tick and writes a PNG only when the perceptual-hash Hamming distance from the last saved frame exceeds the threshold'
    - The capture-and-hash loop is defined in terms of the platform-abstract trait established in T1.2, so new backends plug in without touching the loop
    - Emits one line per saved PNG on stdout so downstream tools (feeder, tests) can consume the stream
    - Ctrl-C terminates cleanly and flushes any in-flight frame
    context: 'Third sub-target of the original T1. Adds the interval loop, the perceptual-hash dedup gate, and the stdout stream that T5 will consume. After this lands, the original T1 is fully superseded and downstream targets (T2, T3, T5, T9, T10) can begin. Observable checkpoint: a directory of deduped slide PNGs accumulating as the screen changes.'
    depends_on:
    - T1.2
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T10:
    name: Local-first redaction pipeline strips PII from every frame before any SaaS egress
    status: achieved
    value: 13.0
    cost: 5.0
    acceptance:
    - Face detection blurs all detected faces in each captured frame before the frame reaches any downstream consumer
    - A pluggable PII redactor (regex + local NER) masks emails, phone numbers, credit cards, government IDs, and obvious names in OCR text
    - An app/domain allowlist drops frames whose frontmost application is not permitted to leave the machine
    - '`--paranoid` retains unredacted originals locally and forwards only redacted artifacts'
    - No code path reaches a network SaaS call without passing through the redactor first (enforced by type or architectural boundary, not by convention)
    context: Corporate use is impossible without this. Runs entirely on-device so the PII never leaves the machine. Face detection via Apple Vision.framework / CoreML blurs participant video tiles; OCR + local NER + regex redacts emails, phone numbers, credit cards, government IDs, and obvious personal names; a domain/app allowlist drops frames whose focused app is not permitted (e.g., HR system, banking). `--paranoid` retains the unredacted original locally and ships only the redacted frame to any downstream consumer. Placed as a blocker for T5 (feeder) because SaaS egress of unredacted meeting frames is a career-ending risk in most enterprises.
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T10.1:
    name: Face-blur redactor blurs all detected faces in each captured frame before any downstream consumer
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - A `Redactor` trait with a `FaceBlurRedactor` implementation lives in `src/redact/`
    - Face detection uses Apple Vision (`objc2-vision`) on macOS; detected rectangles are blurred in the RGBA buffer before the Frame is saved
    - A `RedactPipeline` composes redactors and is invoked on every saved frame when the redaction gate is on
    - Default behaviour is unchanged (redaction opt-in) until T10.3 flips it to opt-out for egress
    - No-face-detected is not an error — the frame passes through unchanged
    context: 'First sub-target of T10. Corresponds to the face-detection-and-blur leg of the full redaction pipeline. Does not address PII text redaction (T10.2) or egress controls (T10.3). Observable checkpoint: run pageflip on a frame with a visible face (e.g. a video call participant tile), see the saved PNG with the face blurred.'
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T10.2:
    name: PII text redactor masks emails, phones, card numbers, IDs, and named entities in OCR'd frame text
    status: identified
    value: 8.0
    cost: 5.0
    observable: true
    acceptance:
    - Frames pass through OCR (Apple Vision VNRecognizeTextRequest on macOS) to yield per-word bounding boxes + strings
    - A regex-based PII detector flags emails, phone numbers, credit-card numbers, and government-ID patterns
    - A local NER pass flags obvious person/org/location names using a small on-device model (e.g. via rust-bert, or a subprocess to a tiny spaCy model)
    - Detected regions are masked (black box, blur, or opaque rectangle) in the saved frame
    - '`RedactPipeline` can chain the text redactor after the face redactor; order is configurable'
    context: 'Second sub-target of T10. OCR is introduced here because redacting text requires it; other targets (T11 resolver, T14 contradictions, T16 dejargoniser) will reuse the same OCR output stream. Observable: a saved frame with visible PII that is blacked out after redaction. Depends on T10.1 so the RedactPipeline trait and plumbing exist before stacking a second redactor on top.'
    depends_on:
    - T10.1
    origin: manual
    discovered: 2026-04-15
  T10.3:
    name: App allowlist + paranoid mode + architectural egress gate enforce redaction before network egress
    status: identified
    value: 8.0
    cost: 3.0
    observable: true
    acceptance:
    - An app/domain allowlist drops frames whose frontmost application is not permitted to leave the machine
    - 'Frontmost-app detection uses NSWorkspace on macOS; allowlist loaded from config (default: empty = permit none for egress)'
    - A `--paranoid` flag retains unredacted originals locally and forwards only redacted artifacts to any egress path
    - Any network egress path (e.g. future `pageflip-feed --egress saas`) is gated on a loaded RedactPipeline — enforced at the type level, not by convention
    - A separate `Egress` trait (or equivalent) makes it a compile error to ship a Frame to a remote endpoint without first passing through `RedactPipeline::apply`
    context: 'Third sub-target of T10. This is the *policy and enforcement* layer on top of the detection layers (T10.1, T10.2). The architectural-boundary requirement (criterion 5 of the original T10) matters most here: we want a type-system-level guarantee that redaction cannot be bypassed on the egress path. Observable: a compile error when attempting to construct an egress call with an un-redacted Frame, plus a runtime rejection when the allowlist denies the frontmost app.'
    depends_on:
    - T10.1
    origin: manual
    discovered: 2026-04-15
  T11:
    name: meetcat's resolver runs as a stateless Task-mode agent turning extracted strings into hyperlinked refs
    status: identified
    value: 8.0
    cost: 8.0
    acceptance:
    - Resolver stages are registerable via config; adding a new reference type (Jira project, Confluence space, internal tool) does not require changes to meetcat's core event loop
    - Built-in stages cover URLs, Jira keys, Confluence page titles, GitHub PR/issue refs, Slack permalinks
    - Runs inside meetcat as a claudia.Task (one-shot per batch of new strings) because the lookup is stateless and cheap; results cache per-meeting so repeated refs do not re-query
    - PowerPoint / Keynote / Google Slides window-title document names are captured per slide event (from the `frontmost_app` field of T18) and threaded through the resolver
    - Unrecognised patterns that repeat are flagged as "candidate MCP resolver needed" in the glossary pane, with sample strings
    - Resolved refs become a stable structured stream consumable by other meetcat specialists (skeptic, constructive, neutral, contradictions, dejargoniser) and rendered as OSC 8 hyperlinks per T19.4
    context: Moves T11 into meetcat's architecture explicitly. The resolver is a natural Task-mode fit because lookups are stateless and per-string — one claudia.Task per batch of new refs found in a slide event. Result shapes ({kind, raw, title, url}) feed into T19.4's hyperlink rendering. Cross-meeting resolver state (which MCPs exist, which docs appear often) lives in mnemo, not in claudia session memory.
    depends_on:
    - T19.2
    - T9.2
    origin: manual
    discovered: 2026-04-14
  T12:
    name: meetcat's neutral session writes a structured meeting artifact folder at meeting stop
    status: identified
    value: 8.0
    cost: 5.0
    observable: true
    acceptance:
    - On meeting-stop, meetcat asks its neutral session agent to emit `decisions.md`, `actions.md`, `open-questions.md`, `contradictions.md`, `references.json` based on the full accumulated session context
    - The artifact folder also contains `slides/*.png` (symlinked or copied from pageflip's output dir), `transcript.jsonl` (from T9.2/T9.3), and session-id pointers for each specialist so the user can attach later
    - Destination path is configurable via meetcat config + CLI flag; default points at a user-designated meetings/ folder
    - transcript.jsonl rows are speaker-attributed (T9.3) and slide-aligned (T9.3)
    - Re-running on the same meeting ID does not destroy the prior artifact (append, version, or refuse-and-warn per config)
    - The artifact is mnemo-indexable — meetcat optionally writes a `<meeting>.md` digest into a configured mnemo-indexed directory so future agents can reference this meeting by content search
    context: 'T12 is now owned by meetcat, not pageflip. The session agent that has been accumulating context all meeting is in the best position to produce the artifact: it has seen every slide in sequence, heard every transcript window, and can distil decisions/actions coherently. Re-uses the existing session context rather than re-analysing from raw artifacts post-hoc.'
    depends_on:
    - T9.3
    - T19.2
    origin: manual
    discovered: 2026-04-14
  T13:
    name: meetcat runs skeptic / constructive / neutral specialists as parallel persistent sessions
    status: identified
    value: 8.0
    cost: 5.0
    acceptance:
    - 'Three claudia.Agent sessions run in parallel across a meeting: `skeptic`, `constructive`, `neutral`'
    - Each session has a system prompt loaded from config; defaults are checked into the repo as `docs/specialists/{skeptic,constructive,neutral}.md`
    - Each session receives every slide event (slide OCR + transcript window + frontmost app) as a single message turn
    - Outputs stream into their own TUI panes (T19.3) within ~5 seconds of slide detection; latency budget is documented
    - The neutral specialist also embeds paste-able URLs and short quotes (via T11 resolver + T19.4 hyperlink rendering), not just summaries
    - Each specialist can be individually enabled/disabled via config or CLI flag (`meetcat --specialists skeptic,neutral`)
    context: 'Explicitly pins the three-perspectives feature to meetcat''s session architecture. The value is cumulative cross-slide context: slide 17''s skepticism knows what was decided on slide 12. Prompt caching makes the growing context tractable per-turn. System prompts are checked in as markdown so they''re tunable without code changes.'
    depends_on:
    - T19.3
    origin: manual
    discovered: 2026-04-14
  T14:
    name: meetcat's contradictions session flags cross-meeting conflicts via mnemo in real time
    status: identified
    value: 13.0
    cost: 5.0
    acceptance:
    - A dedicated `contradictions` claudia.Agent session runs alongside the T13 specialists
    - Each claim in slide OCR and transcript is surfaced to this session along with a mnemo query for semantically similar prior claims (meeting, slide, timestamp, speaker)
    - When the session judges a prior claim conflicts with a new one (numeric, negation, assignee mismatch), it emits a contradiction alert routed to both its own pane AND the neutral pane as a banner
    - False-positive rate is tunable via the session's system prompt + a sensitivity config; default aims for ~1 flagged contradiction per long meeting block rather than noise
    - Each contradiction links (via T19.4 OSC 8) to the prior meeting artifact path and the specific slide or transcript segment that conflicts
    - mnemo is the persistence boundary — session context alone is not used for cross-meeting claims, so the invariant holds even if the contradictions session is restarted
    context: Contradictions need cross-meeting memory, which a per-meeting session doesn't have. Mnemo is the durable store; the session queries it for each new claim. Prompts for this specialist emphasise calibration (1 flag per meeting block, not a firehose) so users trust the signal. Links render as OSC 8 hyperlinks so a contradiction is literally one click away from the source.
    depends_on:
    - T11
    - T12
    origin: manual
    discovered: 2026-04-14
  T15:
    name: Stopping capture leaves meetcat's neutral session attachable for post-meeting Q&A
    status: identified
    value: 5.0
    cost: 2.0
    acceptance:
    - On meeting-stop, meetcat leaves the `neutral` claudia.Agent session alive (tmux-backed) instead of terminating it
    - The user can attach via `meetcat attach neutral` (or equivalent) and immediately resume the conversation with full artifact context loaded
    - Session IDs for all specialists are persisted in the artifact folder so the user can attach to any perspective post-hoc, not just neutral
    - Attaching after a machine reboot resumes the session via `claudia`'s Session-mode tmux substrate
    - If the user exits without attaching, no artifact state is lost; the sessions can be terminated via `meetcat stop-sessions <meeting-id>`
    context: 'T15 falls out of T19.2 almost for free: claudia''s Session mode keeps agents alive via tmux regardless of meetcat''s own process lifetime. The user picks up the conversation where it left off with zero state reconstruction. This is notably better than the original T15 idea of "launch a fresh Claude Code session preloaded with the artifact", because the neutral agent already knows the meeting.'
    depends_on:
    - T12
    - T19.2
    origin: manual
    discovered: 2026-04-14
  T16:
    name: meetcat's dejargoniser session expands acronyms using a local Confluence glossary cache
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - A one-command scrape (`meetcat glossary refresh --confluence-url ...`) builds a local cache of Confluence-defined acronyms and jargon
    - The `dejargoniser` claudia.Agent session (Session mode so it accumulates this meeting's glossary) receives each slide event along with the local cache lookups for acronyms it contains
    - Inline expansion of known acronyms appears in the glossary pane (T19.3) with the Confluence page linked via OSC 8 (T19.4)
    - Unknown acronyms trigger a brief claudia.Task background research pass (Confluence + GitHub + web) and emit candidate expansions in the glossary pane
    - Glossary cache refresh is incremental where possible and bounded in cost — no full re-scrape per meeting
    - Misrecognised acronyms (OCR errors) don't pollute the cache — cache writes require a confidence threshold or user confirmation
    context: Pinned to meetcat's architecture. Session mode for the main dejargoniser (it accumulates the meeting's glossary so repeated acronyms are only defined once), Task mode for the unknown-acronym research passes (stateless per-acronym, parallelisable, Haiku-cheap). Feeds into the glossary pane of T19.3 and uses T19.4's OSC 8 rendering for clickable references.
    depends_on:
    - T11
    origin: manual
    discovered: 2026-04-14
  T17:
    name: Weekly meta-pattern digest is produced by a scheduled `claude -p /skill` invocation over the week's artifacts
    status: identified
    value: 3.0
    cost: 2.0
    acceptance:
    - A `/meetings-digest` (or similar) skill exists and produces a weekly digest from a directory of artifact folders
    - A cron/launchd entry invokes it on schedule
    - 'Digest lands somewhere reviewable: a markdown file committed to a repo, an email, or a mnemo session'
    - 'Output calls out: recurring themes, drifting decisions, aging open questions, newly-surfaced contradictions, and speaker-pattern observations'
    - Implementation is a skill + a scheduler entry, nothing more — no long-running service
    context: 'A scheduled job (cron or launchd) invokes `claude -p ''/meetings-digest''` over the week''s artifact folders. The skill reads slides, transcripts, decisions, open questions, and contradictions, and emits a digest: themes recurring across meetings, decisions that drifted or reversed, open questions that have aged, fresh contradictions worth surfacing, speakers dominating or absent. Zero service to operate — the machinery is just a cron entry pointing at a skill, so there''s nothing to maintain beyond the skill''s prompt itself.'
    depends_on:
    - T12
    origin: manual
    discovered: 2026-04-14
  T18:
    name: pageflip emits a structured slide-event NDJSON stream that downstream tools consume
    status: achieved
    value: 8.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip --events-out <fd|path>` emits one JSON object per newline whenever a slide is saved: `{slide_id, path, t_start_ms, t_end_ms, ocr?, transcript_window?, frontmost_app?}`'
    - Missing fields are omitted gracefully so the schema degrades cleanly as later capabilities land (OCR from T10.2, transcript_window from T9.2, frontmost_app from T10.3)
    - The stream is line-buffered and flushed per event so tailing consumers see events without waiting for a block
    - 'Output target is configurable: `stdout`, a file path, or `fd:<N>` for file-descriptor delivery to a child process; backwards-compatible with the existing `stdout = one absolute path per line` contract when `--events-out` is absent'
    - A JSON schema file (`docs/slide-event-schema.json`) documents the protocol; meetcat and pageflip-feed both validate against it
    context: 'The producer-side contract that decouples pageflip (the capture engine) from consumers (pageflip-feed, meetcat, any future TUI/GUI). Replaces the ad-hoc "path-per-line on stdout" convention with a structured stream that can carry richer metadata as later capabilities land. Degrades gracefully: when OCR isn''t available yet, the `ocr` field is simply absent. Observable: `pageflip --events-out /tmp/events.jsonl` while capturing, then `jq` the file to see structured entries.'
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T19.1:
    name: meetcat binary reads the pageflip slide-event stream and prints structured events
    status: achieved
    value: 5.0
    cost: 2.0
    observable: true
    actual_cost: 1.0
    acceptance:
    - A Go binary `meetcat` exists in a new crate/module (initially a standalone package, likely under a new repo or `cmd/meetcat/` sibling to claudia)
    - '`pageflip --events-out fd:3 | meetcat` reads the slide-event stream from stdin and prints a short summary per event to stderr for manual verification'
    - meetcat validates each event against the JSON schema from T18 and surfaces malformed events with a clear error
    - Implements --help, --version, --help-agent per the global CLI Binaries convention
    - Uses claudia's NDJSON-parsing patterns where applicable to stay consistent
    context: 'First meetcat sub-target: the walking skeleton. No Claude agents yet, no TUI, no panes. Just proves the cross-binary NDJSON protocol works and meetcat can read events as pageflip emits them. Observable checkpoint: run pageflip and meetcat connected by a pipe, see meetcat echo each slide event.'
    depends_on:
    - T18
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
  T19.2:
    name: meetcat spawns persistent claudia.Agent sessions and streams slide events into them
    status: identified
    value: 13.0
    cost: 3.0
    observable: true
    acceptance:
    - 'On meeting start, meetcat uses `claudia.Start` (Session mode, tmux-backed) to spawn one agent per configured specialist: skeptic, constructive, neutral, dejargoniser, contradictions'
    - Each specialist has its own model choice (haiku/sonnet/opus) and system prompt loaded from a config file
    - For each slide event, meetcat renders a standardised message (slide path reference, OCR snippet, transcript window) and injects it into every session agent in parallel
    - Each agent's streaming transcript is routed to stderr (or a per-agent log file) tagged by specialist name, in order of arrival
    - Prompt caching via Claude Code's `cache_control` is leveraged so growing session context does not scale per-turn cost linearly; meetcat documents the expected cost envelope for a 60-minute meeting
    - Session IDs are stable per meeting; meetcat records them to a state file so `meetcat attach <specialist>` post-meeting drops the user into that live session (serves T15)
    - Meeting stop cleanly terminates all sessions with a configurable grace period for final responses
    context: 'The core value of meetcat: parallel persistent Claude sessions, each accumulating cross-slide context, each a different specialist perspective. Session mode is chosen over Task mode deliberately — the value of e.g. the skeptic is that slide 17''s challenge knows about slide 12''s decision. Resolver-style stateless lookups that don''t need context can still use Task mode (a later enhancement). Observable: run a meeting, watch four streams of specialist commentary arrive in parallel.'
    depends_on:
    - T19.1
    origin: manual
    discovered: 2026-04-15
  T19.3:
    name: meetcat presents a TUI with an auto-sizing pane per specialist agent
    status: identified
    value: 8.0
    cost: 5.0
    observable: true
    acceptance:
    - meetcat renders a bubbletea or tview TUI with one pane per running specialist plus a glossary pane
    - Panes auto-size based on available terminal width/height and the live content density of each specialist
    - Each pane shows the specialist name, model, streaming token output for the most recent slide, and a collapsed history of prior turns
    - A status bar shows slide count, elapsed meeting time, running-total USD cost across all sessions, and the frontmost-app of the most recent slide event
    - 'Keyboard shortcuts: Tab to cycle focus, / to search within a pane, Enter to expand/collapse history, q to stop the meeting gracefully'
    - The TUI degrades to a simple scrolling-lines mode when not on a TTY (piped output), so meetcat still works in CI / log-capture contexts
    context: 'Third meetcat sub-target. Turns the raw specialist streams from T19.2 into a meeting-appropriate UX with focused panes. bubbletea is the idiomatic Go choice; tview is a fallback if bubbletea''s auto-sizing model doesn''t fit. Observable: a meeting session''s visible panes updating in parallel as slides land.'
    depends_on:
    - T19.2
    origin: manual
    discovered: 2026-04-15
  T19.4:
    name: meetcat renders URLs, Jira tickets, and document refs as OSC 8 hyperlinks
    status: identified
    value: 5.0
    cost: 2.0
    observable: true
    acceptance:
    - URLs in specialist output are rewritten in the TUI as OSC 8 terminal hyperlinks (`\x1b]8;;URL\x07TEXT\x1b]8;;\x07`)
    - Known patterns (Jira keys, Confluence page names, GitHub PR/issue refs, Slack permalinks) are detected by the resolver (T11) and rewritten as hyperlinks to the resolved URL, with the human-readable title as the link text
    - In non-TTY / non-OSC-8-capable terminals the bytes degrade to plain `[TEXT](URL)` markdown so nothing is lost
    - A glossary pane accumulates known acronyms (from T16) as hyperlinked entries pointing at their Confluence page or best guess
    context: 'Turns the resolver/dejargoniser output into clickable affordances. iTerm2, WezTerm, kitty, and modern Claude Code all render OSC 8 hyperlinks. No framework dependency — just the escape bytes. Observable: clicking a Jira ticket number in meetcat opens the browser at the right ticket.'
    depends_on:
    - T19.3
    origin: manual
    discovered: 2026-04-15
  T2:
    name: Interactive region picker lets the user draw a rectangle on the desktop (macOS)
    status: achieved
    value: 5.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip` with no `--region` shows a semi-transparent fullscreen overlay with crosshair cursor'
    - Click-drag draws a visible rectangle; release begins capture using those pixel coordinates
    - Coordinates are correct on Retina displays (no half-size captures)
    - Escape exits without capturing
    context: Running `pageflip` with no region flag should present a fullscreen transparent overlay with a rubber-band rectangle. Retina-aware (overlay in points, capture coords in pixels). Escape cancels. Tk on uv's Python was a failed first attempt; the Rust implementation uses winit + softbuffer/pixels for drawing, which avoids the Tcl runtime issue entirely.
    depends_on:
    - T1.3
    origin: manual
    discovered: 2026-04-14
    achieved: 2026-04-15
  T20:
    name: pageflip doctor + structured session log emit paste-ready bug-report material with no sensitive content
    status: achieved
    value: 13.0
    cost: 3.0
    observable: true
    actual_cost: 3.0
    acceptance:
    - '`pageflip doctor` prints a single markdown document to stdout covering: pageflip version + git SHA + rust version; macOS version + chip + memory; HF model cache inventory (paths, sizes, present/missing for all 6 models); screen-recording + microphone permission states; presence of tmux / ffmpeg / uv / Python / claude CLI; HF token presence (boolean, never the value); Anthropic auth state (boolean)'
    - '`pageflip --log-file <PATH>` writes a structured NDJSON session log: one line per event (capture_tick, slide_saved, slide_deduped, audio_batch, audio_error, redact_invoked, transcribe_start, transcribe_end, stop) with only non-sensitive fields (timestamps, counts, durations, error_codes, path_hash)'
    - 'Schema enforcement: the log writer accepts only typed events; no free-form string fields can carry content like window titles, OCR text, or transcript text. A Serialize skip_serializing_if is **not** sufficient — the event type simply doesn''t have those fields'
    - Output paths in events are scrubbed via a stable hash to `{output_dir_hash}/{slide_id}` so the log is safely pasteable; the hash is deterministic per-run so events can be correlated, but cannot be reversed
    - '`pageflip doctor --log <PATH>` tails the last N (default 200) lines of a session log and appends them to the markdown output'
    - A `docs/bug-report.md` explains how to copy-paste doctor output into a GitHub issue; the stderr banner after `pageflip doctor` points at it
    context: 'Bug-triage infrastructure. The user runs pageflip on a different machine from where the repo is developed; when something breaks they need to paste diagnostic info into a GitHub issue without accidentally leaking meeting content. The `doctor` subcommand collects everything an upstream maintainer would want to see, and the session log''s schema-enforced structure means the log itself is paste-safe by construction. Observable: run pageflip, trip a known error (e.g. deny microphone), run `pageflip doctor`, see a complete markdown report that identifies the permission miss and contains nothing sensitive.'
    depends_on:
    - T9.1
    origin: manual
    discovered: 2026-04-15
    achieved: 2026-04-15
