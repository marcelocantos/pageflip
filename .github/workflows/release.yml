name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Job 1: gate ──────────────────────────────────────────────────────────────
  # Run the full bullseye invariant suite (fmt + clippy + build + test) before
  # any binaries are published.  Uses macos-14 (Apple Silicon) because xcap and
  # the screen-capture dependencies are macOS-only for now.
  test:
    name: Bullseye gate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run bullseye invariants
        run: make bullseye

  # ── Job 2: build matrix ───────────────────────────────────────────────────────
  # Primary platforms: macOS arm64, Linux x86_64, Linux arm64.
  # Secondary platforms (Windows x86_64, Windows arm64): skipped for now.
  #   TODO(T6): add x86_64-pc-windows-msvc and aarch64-pc-windows-msvc once the
  #   Windows screen-capture backend lands.  Cross-compiling the windows-capture /
  #   winit stack from Linux/macOS requires significant cross-compile setup that
  #   isn't worth investing in until the Windows backend itself is implemented.
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            os_label: darwin
            arch_label: arm64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os_label: linux
            arch_label: amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            os_label: linux
            arch_label: arm64
            cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux arm64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binaries
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package tarballs
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          bin_dir="target/${{ matrix.target }}/release"
          tarball="pageflip-${version}-${{ matrix.os_label }}-${{ matrix.arch_label }}.tar.gz"
          tar czf "$tarball" \
            -C "$bin_dir" pageflip pageflip-feed
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: pageflip-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: ${{ env.TARBALL }}
          retention-days: 1

  # ── Job 3: GitHub Release ─────────────────────────────────────────────────────
  # Collects all tarballs, creates the GitHub Release, and updates the Homebrew
  # formula in the marcelocantos/homebrew-tap tap.
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          install: |-
            bin.install "pageflip"
            bin.install "pageflip-feed"
          test: |-
            system bin/"pageflip", "--version"
            system bin/"pageflip-feed", "--version"
          version: ${{ github.ref_name }}
          target_darwin_amd64: false
          target_darwin_arm64: true
          target_linux_amd64: true
          target_linux_arm64: true
          skip_checksum: true
