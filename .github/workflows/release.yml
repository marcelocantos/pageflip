name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: gate ──────────────────────────────────────────────────────────────
  test:
    name: Bullseye gate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run bullseye invariants
        run: make bullseye

  # ── Job 2: build ─────────────────────────────────────────────────────────────
  # macOS arm64 only — the project is macOS-only (T6/T7 deleted).
  build:
    name: Build macOS arm64
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Package tarball
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="pageflip-${version}-darwin-arm64.tar.gz"
          tar czf "$tarball" \
            -C target/release pageflip pageflip-feed
          echo "TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: pageflip-darwin-arm64
          path: ${{ env.TARBALL }}
          retention-days: 1

  # ── Job 3: GitHub Release + Homebrew ─────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist artifacts
        run: ls -lh dist/

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          install: |-
            bin.install "pageflip"
            bin.install "pageflip-feed"
          test: |-
            system bin/"pageflip", "--version"
            system bin/"pageflip-feed", "--version"
          version: ${{ github.ref_name }}
          target_darwin_amd64: false
          target_darwin_arm64: true
          target_linux_amd64: false
          target_linux_arm64: false
          skip_checksum: true
