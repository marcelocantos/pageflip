<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>meetcat</title>

</head>
<body>
  <header id="status-bar">

      <span id="meeting-id">meetcat</span>
      <span class="sep">·</span>

      <span class="sep">·</span>
      <span id="last-slide">last: —</span>

      <span id="age">age: —</span>

    <div class="bar-right" id="specialist-row">
      <span class="specialist booting" data-role="skeptic" title="skeptic — booting">🔍</span>
      <span class="specialist booting" data-role="constructive" title="constructive — booting">💡</span>
      <span class="specialist booting" data-role="neutral" title="neutral — booting">😶</span>
      <span class="specialist booting" data-role="dejargoniser" title="dejargoniser — booting">📖</span>
      <span class="specialist booting" data-role="contradictions" title="contradictions — booting">🛑</span>
    </div>
  </header>
  <main id="slides"></main>
  <footer id="system-log"></footer>
  <script src="/script.js"></script>
</body>
</html>
